name: hancr_driver
description: "HANCR Driver App – captain-side ride management"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # GraphQL
  graphql_flutter: ^5.1.2

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Error Monitoring (Sentry) — معطَّلة مؤقتاً
  # sentry_flutter: ^8.10.1

  # Routing
  go_router: ^14.6.1

  # Storage
  flutter_secure_storage: ^9.2.2

  # Maps & Location
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.2

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  pin_code_fields: ^8.0.1
  flutter_rating_bar: ^4.0.1

  # Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Local notifications (foreground display)
  flutter_local_notifications: ^17.2.3

  # Permissions
  permission_handler: ^11.3.1

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.2

flutter:
  uses-material-design: true

# ─── App Icons ───
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#22223B"
  adaptive_icon_foreground: "assets/icon/icon-foreground.png"
  web: { generate: false }
  windows: { generate: false }

# ─── Splash ───
flutter_native_splash:
  color: "#22223B"
  image: "assets/icon/splash.png"
  android_12:
    color: "#22223B"
    image: "assets/icon/splash.png"
  ios: true
  android: true
