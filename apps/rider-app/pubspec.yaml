name: hancr_rider
description: "HANCR Rider App — Smart Mobility for MENA | Zancr LLC"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # GraphQL (HTTP + WebSocket Subscriptions)
  graphql_flutter: ^5.1.2

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Error Monitoring (Sentry) — معطَّلة مؤقتاً (مشكلة Kotlin compile)
  # sentry_flutter: ^8.10.1

  # Navigation
  go_router: ^14.6.1

  # Secure Storage (JWT)
  flutter_secure_storage: ^9.2.2

  # Maps & Location
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.2
  url_launcher: ^6.3.0
  share_plus: ^10.1.0

  # Profile picture (capture + direct presigned upload)
  image_picker: ^1.1.2
  http: ^1.2.2

  # Auth — Google Sign-In
  google_sign_in: ^6.2.1

  # AI assistant — voice in/out
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  pin_code_fields: ^8.0.1
  cached_network_image: ^3.4.1
  flutter_rating_bar: ^4.0.1

  # Motion / Animation (N6 — مكتبة الحركة المشتركة)
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  rive: ^0.13.20

  # Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Local notifications (foreground display)
  flutter_local_notifications: ^17.2.3

  # Permissions
  permission_handler: ^11.3.1

  # Utils
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/anim/

# ─── App Icons (generated by flutter_launcher_icons) ───────────────────────
# تشغيل: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/icon.png"               # 1024x1024 PNG (مطلوب)
  adaptive_icon_background: "#0A0807"              # HANCR obsidian (Aurora)
  adaptive_icon_foreground: "assets/icon/icon-foreground.png"
  web:
    generate: false
  windows:
    generate: false

# ─── Splash screen (generated by flutter_native_splash) ────────────────────
# تشغيل: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#0A0807"                # HANCR obsidian (Aurora)
  image: "assets/icon/splash.png" # logo فقط (شفاف)
  android_12:
    color: "#0A0807"
    image: "assets/icon/splash.png"
  ios: true
  android: true
