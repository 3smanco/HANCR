# =============================================
# HANCR — Production Docker Compose
#
# الاستخدام:
#   docker compose -f docker/docker-compose.prod.yml --env-file .env.prod up -d
#
# يستخدم images مبنيَّة من Dockerfile.api و Dockerfile.admin-panel.
# Postgres + Redis في الإنتاج يُفضَّل أن يكونوا managed services
# (RDS / ElastiCache / Aiven) لكن نوفِّر default config محلي للـ self-hosting.
# =============================================

services:
  # ─────────────────────────────────────────────────────────────
  # Database
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: hancr_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - hancr_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hancr_net

  redis:
    image: redis:7-alpine
    container_name: hancr_redis_prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - hancr_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hancr_net

  # ─────────────────────────────────────────────────────────────
  # APIs
  # ─────────────────────────────────────────────────────────────
  rider-api:
    build:
      context: ..
      dockerfile: Dockerfile.api
      args:
        APP: rider-api
    container_name: hancr_rider_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: ../.env.prod
    environment:
      NODE_ENV: production
      RIDER_API_PORT: 3000
    # ports exposed داخلياً فقط — Nginx يوصل إليه عبر الـ network
    expose:
      - '3000'
    networks:
      - hancr_net

  driver-api:
    build:
      context: ..
      dockerfile: Dockerfile.api
      args:
        APP: driver-api
    container_name: hancr_driver_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: ../.env.prod
    environment:
      NODE_ENV: production
      DRIVER_API_PORT: 3000
    expose:
      - '3000'
    networks:
      - hancr_net

  admin-api:
    build:
      context: ..
      dockerfile: Dockerfile.api
      args:
        APP: admin-api
    container_name: hancr_admin_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: ../.env.prod
    environment:
      NODE_ENV: production
      ADMIN_API_PORT: 3000
    expose:
      - '3000'
    networks:
      - hancr_net

  # ─────────────────────────────────────────────────────────────
  # Admin Panel (Next.js)
  # ─────────────────────────────────────────────────────────────
  admin-panel:
    build:
      context: ..
      dockerfile: Dockerfile.admin-panel
      # NEXT_PUBLIC_* تُخبَز وقت البناء — تُمرَّر كـ build args لا runtime env.
      args:
        NEXT_PUBLIC_ADMIN_API_URL: ${ADMIN_API_URL:-https://api.hancr.com/admin/graphql}
        NEXT_PUBLIC_GOOGLE_MAPS_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_KEY:-}
    container_name: hancr_admin_panel
    restart: always
    depends_on:
      - admin-api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_ADMIN_API_URL: ${ADMIN_API_URL:-http://admin-api:3000/graphql}
    expose:
      - '3000'
    networks:
      - hancr_net

  # ─────────────────────────────────────────────────────────────
  # Nginx Reverse Proxy — يخدم api.hancr.com + admin.hancr.com
  # SSL termination يُتولَّى عبر Cloudflare (مُفضَّل) أو certbot
  # ─────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: hancr_nginx
    restart: always
    depends_on:
      - rider-api
      - driver-api
      - admin-api
      - admin-panel
    ports:
      - '80:80'
      # - '443:443'  # فعِّله عند ربط Let's Encrypt
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - hancr_nginx_logs:/var/log/nginx
      # - ./nginx/ssl:/etc/nginx/ssl:ro  # عند ربط Let's Encrypt
    networks:
      - hancr_net

networks:
  hancr_net:
    driver: bridge

volumes:
  hancr_pg_data:
    driver: local
  hancr_redis_data:
    driver: local
  hancr_nginx_logs:
    driver: local
