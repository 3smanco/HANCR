# =============================================
# HANCR Nginx Reverse Proxy — Production
#
# يخدم:
#   api.hancr.com/rider/*    →  rider-api:3000
#   api.hancr.com/driver/*   →  driver-api:3000
#   api.hancr.com/admin/*    →  admin-api:3000
#   admin.hancr.com/*        →  admin-panel:3000
#   hancr.com / www.hancr.com → static (landing) أو redirect
#
# SSL: يُتوقع أن Cloudflare يتولَّى SSL termination (Origin pull).
# لو لم تستخدم Cloudflare، أضف certbot للحصول على Let's Encrypt certificates.
# =============================================

# ─── Connection upgrade map (WebSocket subscriptions) ─────────
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ─── Rate limit zones (extra layer فوق NestJS Throttler) ──────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=3r/s;

# =============================================
# api.hancr.com — جميع الـ APIs الـ 3
# =============================================
server {
    listen 80;
    listen [::]:80;
    server_name api.hancr.com;

    # Cloudflare يعيد توجيه HTTPS إلى origin، أو فعِّل redirect → HTTPS:
    # return 301 https://$server_name$request_uri;

    # ─── Logs ───
    access_log /var/log/nginx/api.access.log;
    error_log  /var/log/nginx/api.error.log;

    # ─── Health (للـ Cloudflare/uptime) ───
    location = /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # ─── Rider API ─────────────────────────────────────
    location /rider/ {
        # rate limit أعلى لـ auth endpoints
        location /rider/graphql {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://rider-api:3000/graphql;
            include /etc/nginx/snippets/proxy_common.conf;
        }
        # WebSocket subscriptions
        location /rider/subscriptions {
            proxy_pass http://rider-api:3000/graphql;
            include /etc/nginx/snippets/proxy_ws.conf;
        }
        # Webhook endpoints (للبوابات الدفع)
        location /rider/wallet/webhook/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://rider-api:3000/wallet/webhook/;
            include /etc/nginx/snippets/proxy_common.conf;
        }
        # Health passthrough
        location /rider/health/ {
            proxy_pass http://rider-api:3000/health/;
            include /etc/nginx/snippets/proxy_common.conf;
        }
        # Catch-all
        proxy_pass http://rider-api:3000/;
        include /etc/nginx/snippets/proxy_common.conf;
    }

    # ─── Driver API ─────────────────────────────────────
    location /driver/ {
        location /driver/graphql {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://driver-api:3000/graphql;
            include /etc/nginx/snippets/proxy_common.conf;
        }
        location /driver/subscriptions {
            proxy_pass http://driver-api:3000/graphql;
            include /etc/nginx/snippets/proxy_ws.conf;
        }
        location /driver/health/ {
            proxy_pass http://driver-api:3000/health/;
            include /etc/nginx/snippets/proxy_common.conf;
        }
        proxy_pass http://driver-api:3000/;
        include /etc/nginx/snippets/proxy_common.conf;
    }

    # ─── Admin API ─────────────────────────────────────
    location /admin/ {
        location /admin/graphql {
            # Admin endpoints أكثر صرامة
            limit_req zone=auth_limit burst=10 nodelay;
            proxy_pass http://admin-api:3000/graphql;
            include /etc/nginx/snippets/proxy_common.conf;
        }
        location /admin/health/ {
            proxy_pass http://admin-api:3000/health/;
            include /etc/nginx/snippets/proxy_common.conf;
        }
        proxy_pass http://admin-api:3000/;
        include /etc/nginx/snippets/proxy_common.conf;
    }

    # ─── 404 لكل شيء آخر ───
    location / {
        return 404 '{"error":"Not Found","message":"Use /rider, /driver, or /admin prefix"}';
        add_header Content-Type application/json;
    }
}

# =============================================
# admin.hancr.com — Admin Panel UI
# =============================================
server {
    listen 80;
    listen [::]:80;
    server_name admin.hancr.com;

    access_log /var/log/nginx/admin-panel.access.log;
    error_log  /var/log/nginx/admin-panel.error.log;

    location / {
        proxy_pass http://admin-panel:3000;
        include /etc/nginx/snippets/proxy_common.conf;
    }
}

# =============================================
# hancr.com / www.hancr.com — Landing
# =============================================
server {
    listen 80;
    listen [::]:80;
    server_name hancr.com www.hancr.com;

    # حالياً: redirect إلى admin (مؤقت حتى يُبنى landing page).
    # لاحقاً: ضع موقع تسويقي static هنا أو يُستضاف على Cloudflare Pages/Vercel.
    return 301 https://admin.hancr.com$request_uri;
}
